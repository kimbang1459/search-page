<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검색</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #111;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 100%;
      max-width: 620px;
      padding: 48px 28px;
    }

    /* ── 검색 행 ── */
    .search-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 38px;
      height: 38px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      border-radius: 10px;
    }

    .logo-naver   { background: #03c75a; color: #fff; font-size: 15px; }
    .logo-youtube { background: #ff0000; color: #fff; font-size: 11px; }
    .logo-google  { background: #fff;    color: #4285f4; font-size: 15px; }

    form {
      flex: 1;
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border-radius: 12px;
      border: 1px solid #272727;
      overflow: hidden;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    form:focus-within {
      border-color: #444;
      box-shadow: 0 0 0 3px rgba(255,255,255,0.04);
    }

    input {
      flex: 1;
      padding: 13px 16px;
      background: transparent;
      border: none;
      outline: none;
      color: #e8e8e8;
      font-size: 15px;
    }

    input::placeholder { color: #444; }

    button {
      padding: 0 16px;
      height: 100%;
      background: transparent;
      border: none;
      cursor: pointer;
      color: #444;
      font-size: 17px;
      transition: color 0.15s;
    }

    button:hover { color: #aaa; }

    /* ── 구분선 ── */
    .divider {
      height: 1px;
      background: #1e1e1e;
      margin: 4px 0;
    }

    /* ── 섹션 공통 ── */
    .section {
      display: flex;
      flex-direction: column;
      gap: 10px;
      padding-left: 50px;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: #3a3a3a;
      letter-spacing: 0.8px;
      text-transform: uppercase;
    }

    .updated {
      font-size: 10px;
      color: #2e2e2e;
    }

    /* ── 지수 그리드 ── */
    .market-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    /* ── 종목 그리드 ── */
    .stock-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    /* ── 카드 공통 ── */
    .card {
      background: #161616;
      border: 1px solid #222;
      border-radius: 10px;
      padding: 11px 12px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: border-color 0.15s;
      min-width: 0;
    }

    .card:hover { border-color: #333; }

    .card-name {
      font-size: 10px;
      color: #555;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-ticker {
      font-size: 9px;
      color: #333;
    }

    .card-value {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
      letter-spacing: -0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-change {
      font-size: 10px;
      font-weight: 500;
      white-space: nowrap;
    }

    .loading { color: #2e2e2e; }
    .up      { color: #ef4444; }
    .down    { color: #3b82f6; }
    .flat    { color: #555; }
  </style>
</head>
<body>
  <div class="container">

    <!-- 네이버 -->
    <div class="search-row">
      <div class="logo logo-naver">N</div>
      <form action="https://search.naver.com/search.naver" method="get" target="_blank">
        <input name="query" type="text" placeholder="네이버 검색" autofocus>
        <button type="submit">↵</button>
      </form>
    </div>

    <!-- 시장 지수 -->
    <div class="section">
      <div class="section-header">
        <span class="section-label">Market</span>
        <span class="updated" id="updated-market"></span>
      </div>
      <div class="market-grid" id="market-grid"></div>
    </div>

    <!-- 내 종목 -->
    <div class="section">
      <div class="section-header">
        <span class="section-label">내 종목</span>
        <span class="updated" id="updated-stocks"></span>
      </div>
      <div class="stock-grid" id="stock-grid"></div>
    </div>

    <div class="divider"></div>

    <!-- 유튜브 -->
    <div class="search-row">
      <div class="logo logo-youtube">▶</div>
      <form action="https://www.youtube.com/results" method="get" target="_blank">
        <input name="search_query" type="text" placeholder="YouTube 검색">
        <button type="submit">↵</button>
      </form>
    </div>

    <!-- 구글 -->
    <div class="search-row">
      <div class="logo logo-google">G</div>
      <form action="https://www.google.com/search" method="get" target="_blank">
        <input name="q" type="text" placeholder="Google 검색">
        <button type="submit">↵</button>
      </form>
    </div>

  </div>

  <script>
    // ── 시장 지수 ──────────────────────────────────────────────
    const INDICES = [
      { id: 'kospi',  symbol: '%5EKS11', label: 'KOSPI'   },
      { id: 'kosdaq', symbol: '%5EKQ11', label: 'KOSDAQ'  },
      { id: 'sp500',  symbol: '%5EGSPC', label: 'S&P 500' },
      { id: 'nasdaq', symbol: '%5EIXIC', label: 'NASDAQ'  },
    ];

    // ── 내 종목 (한국: 코드만, 미국: 티커) ─────────────────────
    const MY_STOCKS = [
      { code: '457480', kr: true  },
      { code: '192820', kr: true  },
      { code: '005930', kr: true  },
      { code: 'AAPL',   kr: false },
      { code: 'TSLL',   kr: false },
      { code: 'NVDL',   kr: false },
      { code: '005490', kr: true  },
      { code: '367380', kr: true  },
      { code: '360200', kr: true  },
      { code: '458730', kr: true  },
    ];

    // ── 유틸 ───────────────────────────────────────────────────
    function fmt(n, digits = 2) {
      if (n == null) return '—';
      return n.toLocaleString('en-US', { minimumFractionDigits: digits, maximumFractionDigits: digits });
    }

    function nowTime() {
      return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    }

    async function fetchQuote(symbol) {
      const url = `https://query1.finance.yahoo.com/v8/finance/chart/${symbol}?interval=1d&range=2d`;
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const json = await res.json();
      const result = json.chart.result;
      if (!result) throw new Error('no result');
      const meta = result[0].meta;
      return {
        name:  meta.shortName || meta.symbol,
        price: meta.regularMarketPrice,
        prev:  meta.chartPreviousClose,
      };
    }

    function changeClass(diff) {
      return diff > 0 ? 'up' : diff < 0 ? 'down' : 'flat';
    }

    // ── 지수 카드 렌더 ─────────────────────────────────────────
    function renderMarketCards() {
      const grid = document.getElementById('market-grid');
      grid.innerHTML = INDICES.map(({ id, label }) => `
        <div class="card">
          <span class="card-name">${label}</span>
          <span class="card-value loading" id="mv-${id}">···</span>
          <span class="card-change" id="mc-${id}"></span>
        </div>`).join('');
    }

    async function loadMarket() {
      await Promise.all(INDICES.map(async ({ id, symbol }) => {
        try {
          const { price, prev } = await fetchQuote(symbol);
          const diff = price - prev;
          const pct  = diff / prev * 100;
          const sign = diff >= 0 ? '+' : '';
          document.getElementById(`mv-${id}`).textContent = fmt(price);
          document.getElementById(`mv-${id}`).classList.remove('loading');
          document.getElementById(`mc-${id}`).textContent = `${sign}${fmt(diff)} (${sign}${pct.toFixed(2)}%)`;
          document.getElementById(`mc-${id}`).className = `card-change ${changeClass(diff)}`;
        } catch {
          document.getElementById(`mv-${id}`).textContent = '—';
        }
      }));
      document.getElementById('updated-market').textContent = nowTime() + ' 기준';
    }

    // ── 종목 카드 렌더 ─────────────────────────────────────────
    function renderStockCards() {
      const grid = document.getElementById('stock-grid');
      grid.innerHTML = MY_STOCKS.map(({ code }) => `
        <div class="card">
          <span class="card-name loading" id="sn-${code}">···</span>
          <span class="card-ticker">${code}</span>
          <span class="card-value loading" id="sv-${code}">···</span>
          <span class="card-change" id="sc-${code}"></span>
        </div>`).join('');
    }

    async function loadStock({ code, kr }) {
      // 한국 주식: .KS 먼저 시도, 실패 시 .KQ
      const symbols = kr ? [`${code}.KS`, `${code}.KQ`] : [code];
      let data = null;
      for (const sym of symbols) {
        try { data = await fetchQuote(sym); break; } catch {}
      }
      if (!data) {
        document.getElementById(`sn-${code}`).textContent = code;
        document.getElementById(`sv-${code}`).textContent = '—';
        return;
      }
      const { name, price, prev } = data;
      const diff = price - prev;
      const pct  = diff / prev * 100;
      const sign = diff >= 0 ? '+' : '';
      const digits = price >= 100 ? 0 : 2;

      document.getElementById(`sn-${code}`).textContent = name;
      document.getElementById(`sn-${code}`).classList.remove('loading');
      document.getElementById(`sv-${code}`).textContent = fmt(price, digits);
      document.getElementById(`sv-${code}`).classList.remove('loading');
      document.getElementById(`sc-${code}`).textContent = `${sign}${pct.toFixed(2)}%`;
      document.getElementById(`sc-${code}`).className = `card-change ${changeClass(diff)}`;
    }

    async function loadStocks() {
      await Promise.all(MY_STOCKS.map(loadStock));
      document.getElementById('updated-stocks').textContent = nowTime() + ' 기준';
    }

    // ── 초기화 & 주기 갱신 ────────────────────────────────────
    renderMarketCards();
    renderStockCards();
    loadMarket();
    loadStocks();
    setInterval(() => { loadMarket(); loadStocks(); }, 60000);
  </script>
</body>
</html>
