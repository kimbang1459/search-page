<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>검색</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
      width: 100%;
      max-width: 560px;
      padding: 40px 24px;
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 36px;
      height: 36px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      border-radius: 8px;
    }

    .logo-naver { background: #03c75a; color: white; font-size: 14px; }
    .logo-youtube { background: #ff0000; color: white; font-size: 10px; }
    .logo-google { background: #fff; color: #4285f4; font-size: 14px; }

    form {
      flex: 1;
      display: flex;
      background: #1e1e1e;
      border-radius: 12px;
      border: 1px solid #2e2e2e;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    form:focus-within {
      border-color: #555;
    }

    input {
      flex: 1;
      padding: 12px 16px;
      background: transparent;
      border: none;
      outline: none;
      color: #e0e0e0;
      font-size: 15px;
    }

    input::placeholder { color: #555; }

    button {
      padding: 0 16px;
      background: transparent;
      border: none;
      cursor: pointer;
      color: #666;
      font-size: 16px;
      transition: color 0.2s;
    }

    button:hover { color: #ccc; }
  </style>
</head>
<body>
  <div class="container">

    <div class="search-row">
      <div class="logo logo-naver">N</div>
      <form action="https://search.naver.com/search.naver" method="get" target="_blank">
        <input name="query" type="text" placeholder="네이버 검색" autofocus>
        <button type="submit">→</button>
      </form>
    </div>

    <div class="search-row">
      <div class="logo logo-youtube">▶</div>
      <form action="https://www.youtube.com/results" method="get" target="_blank">
        <input name="search_query" type="text" placeholder="YouTube 검색">
        <button type="submit">→</button>
      </form>
    </div>

    <div class="search-row">
      <div class="logo logo-google">G</div>
      <form action="https://www.google.com/search" method="get" target="_blank">
        <input name="q" type="text" placeholder="Google 검색">
        <button type="submit">→</button>
      </form>
    </div>

  </div>
</body>
</html>
